<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64">
  <defs>
    <!-- Primary gradient: cyan → violet -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#7B2FBE"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Icon background glow -->
    <radialGradient id="icon-bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F0F1A;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- ══════════════════════════════════════════════
       ICON MARK (left side) — brain + desk symbol
       ══════════════════════════════════════════════ -->

  <!-- Icon background pill -->
  <rect x="0" y="8" width="48" height="48" rx="12" fill="url(#icon-bg-glow)"/>
  <rect x="0" y="8" width="48" height="48" rx="12" fill="none" stroke="url(#grad-main)" stroke-width="1.2" opacity="0.6"/>

  <!-- Brain outline -->
  <ellipse cx="24" cy="26" rx="12" ry="9.5" fill="none" stroke="url(#grad-main)" stroke-width="2" filter="url(#glow)"/>

  <!-- Neural connection dots -->
  <circle cx="12.5" cy="23" r="1.8" fill="#00D4FF" opacity="0.9"/>
  <circle cx="35.5" cy="21" r="1.8" fill="#00D4FF" opacity="0.9"/>
  <circle cx="24" cy="14.5" r="1.8" fill="#7B2FBE" opacity="0.9"/>
  <circle cx="15" cy="31" r="1.6" fill="#00E5A0" opacity="0.85"/>
  <circle cx="33" cy="30" r="1.6" fill="#7B2FBE" opacity="0.85"/>

  <!-- Neural connection lines -->
  <line x1="14.3" y1="23" x2="20" y2="22" stroke="#00D4FF" stroke-width="1.2" opacity="0.5"/>
  <line x1="24" y1="16.3" x2="24" y2="20" stroke="#7B2FBE" stroke-width="1.2" opacity="0.5"/>
  <line x1="33.7" y1="22" x2="29" y2="23" stroke="#00D4FF" stroke-width="1.2" opacity="0.5"/>
  <line x1="16.5" y1="30" x2="20" y2="27" stroke="#00E5A0" stroke-width="1.1" opacity="0.5"/>
  <line x1="31.5" y1="29" x2="28" y2="27" stroke="#7B2FBE" stroke-width="1.1" opacity="0.5"/>

  <!-- Desk surface -->
  <rect x="14" y="39" width="20" height="2.5" rx="1.25" fill="url(#grad-main)" opacity="0.9"/>
  <!-- Desk legs -->
  <rect x="16" y="41.5" width="2.5" height="6" rx="1" fill="url(#grad-main)" opacity="0.75"/>
  <rect x="29.5" y="41.5" width="2.5" height="6" rx="1" fill="url(#grad-main)" opacity="0.75"/>

  <!-- ══════════════════════════════════════════════
       WORDMARK (right of icon)
       ══════════════════════════════════════════════ -->

  <!-- "Neuro" — white, bold -->
  <text
    x="60"
    y="38"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.3"
    fill="#FFFFFF"
  >Neuro</text>

  <!-- "Desk" — gradient, bold -->
  <text
    x="126"
    y="38"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="22"
    font-weight="800"
    letter-spacing="-0.3"
    fill="url(#grad-main)"
  >Desk</text>

  <!-- Tagline beneath wordmark -->
  <text
    x="61"
    y="50"
    font-family="'Inter', 'Segoe UI', Arial, sans-serif"
    font-size="8"
    font-weight="400"
    letter-spacing="2.5"
    fill="#00D4FF"
    opacity="0.65"
    text-anchor="start"
  >INTELLIGENCE AT YOUR SERVICE</text>

</svg>
